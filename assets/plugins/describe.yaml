# Executes `kubectl describe` for the highlighted resource

name: describe
description: "opens kubectl describe"
shortcut: Shift+D
command: kubectl
args:
  - describe
  - $PLURAL
  - $COL[NAME]
  - --namespace
  - $COL[NAMESPACE]
excluded_scopes:
  - containers
keep_output: true
pin_to_top: true
highlighted: true
