# Example plugin that executes `dive` for the highlighted container
# https://github.com/wagoodman/dive

name: dive
aliases: []
description: "opens containers's image in dive"
shortcut: Shift+L
command: dive
args:
  - $COL[IMAGE]
scopes:
  - containers
excluded_scopes: []
confirm: false
interactive: true
keep_output: false
keep_error: true
pin_to_top: false
highlighted: true
selected: false
for_each: false
